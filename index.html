<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <!-- tailwind and daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- style css -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="geist">
    <main class="container shadow-xl/30 rounded-lg md:w-[520px] mx-auto my-20 py-5 bg-white text-center">
        <img class="mx-auto" src="assets/github-logo.png" alt="">
        <h1 class="mt-6 text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h1>
        <p class="text-[#64748B] mt-1 font-normal text-base">Sign in to manage your issues</p>

        <!-- login -->
        <div class="card w-full">
            <div class="card-body w-full">
                <fieldset class=" fieldset">
                    <label class="label text-base text-[#1F2937]">Username</label>
                    <input id="input-user" type="text" class="outline-none input w-full text-[#64748B]"
                        placeholder="Enter Username" />
                    <p class="text-left text-[#4A00FF] text-sm mb-2">Default : admin</p>
                    <label class="label text-base font-medium text-[#1F2937]">Password</label>
                    <input id="input-password" type="password" class="outline-none input w-full text-[#64748B]"
                        placeholder="Enter Password" />
                    <p class="text-left text-[#4A00FF] text-sm mb-2">Default : admin123</p>
                    <button id="login-btn" class="cursor-pointer btn btn-primary mt-4">Sign In</button>
                </fieldset>

                <div class="flex justify-center gap-5 items-center">
                    <hr class="text-[#E4E4E7] w-full">
                    <div class="">Or</div>
                    <hr class="text-[#E4E4E7] w-full">
                </div>
            </div>

        </div>
        <!-- or -->
    </main>
    <!-- script js -->
    <script src="script.js"></script>
</body>

</html>
